name: Windows ビルド確認

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: VLC インストール
        run: choco install vlc --yes --no-progress

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt pyinstaller

      - name: PyInstaller でビルド
        run: pyinstaller installer/looplayer.spec

      - name: アーティファクトをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: looplay-Windows
          path: dist/looplay.exe
          retention-days: 30
